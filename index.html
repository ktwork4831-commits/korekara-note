<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="これからノート" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>これからノート</title>
  <style>
    :root{--bg:#07111f;--bg2:#0d1c2d;--panel:rgba(12,29,47,.78);--panel-strong:rgba(16,38,60,.94);--ink:#eefaff;--muted:#9fb8c8;--line:rgba(124,213,255,.18);--accent:#63e6ff;--accent2:#77ffd0;--danger:#ff8f9d;--shadow:0 22px 70px rgba(0,0,0,.34);--glow:0 0 28px rgba(99,230,255,.16)}
    *{box-sizing:border-box}html{scroll-behavior:smooth;background:var(--bg)}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;color:var(--ink);background:radial-gradient(circle at 14% 8%,rgba(83,207,255,.18),transparent 28%),radial-gradient(circle at 88% 4%,rgba(106,255,203,.12),transparent 26%),linear-gradient(160deg,var(--bg) 0%,var(--bg2) 52%,#081522 100%);overflow-x:hidden}
    body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.2;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:34px 34px;mask-image:linear-gradient(to bottom,black,transparent 88%)}
    button,input,textarea,select{font:inherit}button{cursor:pointer}
    .wrap{width:min(860px,calc(100% - 28px));margin:0 auto;padding:30px 0 max(24px,env(safe-area-inset-bottom));position:relative}
    header{position:relative;padding:26px 4px 16px}header:after{content:"";position:absolute;right:2%;top:4px;width:155px;height:155px;border:1px solid rgba(99,230,255,.18);border-radius:50%;box-shadow:0 0 60px rgba(99,230,255,.08),inset 0 0 40px rgba(99,230,255,.05)}header:before{content:"";position:absolute;right:42px;top:44px;width:72px;height:72px;border:1px dashed rgba(119,255,208,.34);border-radius:50%}
    .eyebrow{display:inline-flex;align-items:center;gap:9px;font-size:12px;font-weight:800;letter-spacing:.16em;color:var(--accent2)}.eyebrow:before{content:"";width:24px;height:1px;background:linear-gradient(90deg,var(--accent),var(--accent2));box-shadow:var(--glow)}
    h1{position:relative;z-index:1;margin:10px 0 8px;font-size:clamp(36px,8vw,58px);line-height:1.06;letter-spacing:-.03em;background:linear-gradient(100deg,#fff 12%,#9bf1ff 56%,#8dffd9);-webkit-background-clip:text;background-clip:text;color:transparent}
    header p{position:relative;z-index:1;margin:0;color:var(--muted);line-height:1.9;max-width:610px}
    .notice{margin:16px 0 18px;background:linear-gradient(135deg,rgba(99,230,255,.09),rgba(119,255,208,.06));border:1px solid rgba(99,230,255,.22);border-radius:18px;padding:15px 17px;font-size:13px;line-height:1.8}.notice strong{color:#dffcff}
    .toolbar{position:sticky;top:0;z-index:6;display:flex;gap:9px;flex-wrap:wrap;padding:12px 0;background:rgba(7,17,31,.8);backdrop-filter:blur(18px);border-bottom:1px solid rgba(99,230,255,.08)}
    .btn{border:1px solid var(--line);background:rgba(13,31,50,.82);border-radius:14px;padding:11px 16px;color:var(--ink);font-weight:800;transition:.2s}.btn:hover{transform:translateY(-1px);border-color:rgba(99,230,255,.42);box-shadow:var(--glow)}.btn.primary{background:linear-gradient(120deg,#36cbe8,#4fe2b1);border-color:transparent;color:#06131e;box-shadow:0 12px 34px rgba(70,220,215,.22)}.btn.danger{color:var(--danger)}
    .save-state{margin-left:auto;align-self:center;font-size:12px;color:var(--accent2);display:flex;align-items:center;gap:7px}.save-state:before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent2);box-shadow:0 0 14px rgba(119,255,208,.8)}
    section{position:relative;overflow:hidden;background:linear-gradient(145deg,var(--panel-strong),var(--panel));border:1px solid var(--line);border-radius:24px;padding:22px;margin:15px 0;box-shadow:var(--shadow);backdrop-filter:blur(20px)}section:before{content:"";position:absolute;inset:0 0 auto 0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);opacity:.6}
    .section-head{margin-bottom:18px;position:relative;z-index:1}.section-head h2{margin:0;font-size:21px}.section-head p{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.6}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}.field{display:flex;flex-direction:column;gap:8px;position:relative;z-index:1}.field.full{grid-column:1/-1}.field label{font-size:13px;font-weight:800;color:#dff5ff}
    .field input,.field textarea,.field select{width:100%;border:1px solid rgba(145,210,239,.2);border-radius:14px;background:rgba(4,14,25,.62);padding:13px 14px;color:var(--ink);outline:none;transition:.2s}.field textarea{min-height:88px;resize:vertical}.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);background:rgba(7,22,35,.9);box-shadow:0 0 0 3px rgba(99,230,255,.1),0 0 22px rgba(99,230,255,.08)}select option{color:#081522;background:#fff}
    .footer-note{font-size:12px;line-height:1.8;color:var(--muted);padding:8px 5px 0;text-align:center;margin:0}
    dialog{border:1px solid rgba(99,230,255,.22);border-radius:22px;padding:0;width:min(650px,calc(100% - 28px));background:#0a1828;color:var(--ink);box-shadow:0 34px 110px rgba(0,0,0,.58)}dialog::backdrop{background:rgba(2,8,15,.72);backdrop-filter:blur(8px)}.modal{padding:23px}.modal h3{margin:0 0 13px}.preview{white-space:pre-wrap;background:rgba(2,11,19,.72);border:1px solid var(--line);border-radius:15px;padding:15px;max-height:52vh;overflow:auto;line-height:1.75;font-size:14px}.modal-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:15px;flex-wrap:wrap}
    @media(max-width:620px){.wrap{width:min(100% - 18px,860px);padding-top:10px;padding-bottom:max(14px,env(safe-area-inset-bottom))}header{padding-top:22px}header:after,header:before{opacity:.5;transform:scale(.8);transform-origin:top right}.grid{grid-template-columns:1fr}.field.full{grid-column:auto}section{padding:18px;border-radius:20px}.save-state{width:100%;margin-left:2px}.btn{flex:1 1 auto}.btn.danger{flex:0 0 auto}.footer-note{padding-bottom:0}}
  </style>
</head>
<body>
<main class="wrap">
  <header><div class="eyebrow">これからを安心して楽しむために</div><h1>これからノート</h1><p>大切な情報を、必要な分だけ。入力内容はこの端末のブラウザ内に保存されます。</p></header>
  <div class="notice"><strong>安全のため：</strong>暗証番号やパスワードそのものは入力せず、「保管場所」だけを記録してください。</div>
  <div class="toolbar">
    <button class="btn primary" id="shareBtn" type="button">LINE・メールで共有</button>
    <button class="btn" id="csvBtn" type="button">CSVダウンロード</button>
    <button class="btn danger" id="resetBtn" type="button">すべて消去</button>
    <span class="save-state" id="saveState">保存済み</span>
  </div>
  <form id="noteForm" autocomplete="off"></form>
  <p class="footer-note">このノートは希望や情報を整理するためのものです。相続方法を法的に指定する場合は、正式な遺言書が必要です。</p>
</main>
<dialog id="shareDialog"><div class="modal"><h3>共有する内容</h3><div class="preview" id="sharePreview"></div><div class="modal-actions"><button class="btn" id="closeDialog" type="button">閉じる</button><button class="btn" id="copyBtn" type="button">コピー</button><button class="btn primary" id="nativeShareBtn" type="button">LINE・メールで共有</button></div></div></dialog>
<script>
const sections=[
 {title:'最初に連絡する人',desc:'もしものとき、最初に知らせてほしい人',fields:[['contactName','氏名','text'],['relation','続柄','text'],['phone','電話番号','tel']]},
 {title:'医療について',desc:'治療や判断に必要な最低限の情報',fields:[['conditions','持病・服用中の薬','textarea'],['allergies','アレルギー','textarea'],['lifeSupport','延命治療の希望','select',['未選択','希望する','希望しない','家族・医師の判断に任せる','その他']],['decisionMaker','判断を任せたい人','text']]},
 {title:'財産・保険・借入れ',desc:'金額ではなく、存在と確認先を中心に',fields:[['banks','利用している銀行','textarea'],['securities','証券会社','textarea'],['insurance','保険会社','textarea'],['debts','借金・ローン','textarea'],['documents','重要書類の保管場所','textarea']]},
 {title:'スマートフォン・葬儀',desc:'解約や手続きで家族が困らないために',fields:[['passwordLocation','スマホやパスワード情報の保管場所','textarea'],['subscriptions','解約が必要なサービス','textarea'],['funeral','葬儀の希望','textarea'],['grave','お墓の場所','textarea'],['writtenDate','記入日','date']]}
];
const STORAGE='korekara-note-v1';let state=JSON.parse(localStorage.getItem(STORAGE)||'{}');const form=document.getElementById('noteForm');
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function render(){form.innerHTML=sections.map(sec=>`<section><div class="section-head"><h2>${sec.title}</h2><p>${sec.desc}</p></div><div class="grid">${sec.fields.map(f=>{const [id,label,type,opts]=f;const value=state[id]||'';const control=type==='textarea'?`<textarea id="${id}" data-key="${id}">${esc(value)}</textarea>`:type==='select'?`<select id="${id}" data-key="${id}">${opts.map(o=>`<option ${value===o?'selected':''}>${o}</option>`).join('')}</select>`:`<input id="${id}" data-key="${id}" type="${type}" value="${esc(value)}">`;return `<div class="field ${type==='textarea'?'full':''}"><label for="${id}">${label}</label>${control}</div>`}).join('')}</div></section>`).join('')}
render();let timer;
form.addEventListener('input',e=>{if(!e.target.dataset.key)return;state[e.target.dataset.key]=e.target.value;document.getElementById('saveState').textContent='保存中…';clearTimeout(timer);timer=setTimeout(()=>{localStorage.setItem(STORAGE,JSON.stringify(state));document.getElementById('saveState').textContent='保存済み'},250)});
function allRows(){const rows=[];sections.forEach(sec=>{const items=[];sec.fields.forEach(([id,label])=>{const value=(state[id]||'').trim();if(value&&value!=='未選択')items.push([label,value])});if(items.length)rows.push([sec.title,items])});return rows}
function shareText(){const rows=allRows();if(!rows.length)return '共有する内容が入力されていません。';return ['【これからノート】',...rows.flatMap(([title,items])=>['',`■ ${title}`,...items.map(([l,v])=>`${l}：${v}`)])].join('\n')}
const dialog=document.getElementById('shareDialog');document.getElementById('shareBtn').onclick=()=>{document.getElementById('sharePreview').textContent=shareText();dialog.showModal()};document.getElementById('closeDialog').onclick=()=>dialog.close();document.getElementById('copyBtn').onclick=async()=>{await navigator.clipboard.writeText(shareText());document.getElementById('copyBtn').textContent='コピーしました';setTimeout(()=>document.getElementById('copyBtn').textContent='コピー',1300)};document.getElementById('nativeShareBtn').onclick=async()=>{const text=shareText();if(navigator.share){await navigator.share({title:'これからノート',text})}else{await navigator.clipboard.writeText(text);alert('共有機能が使えないため、内容をコピーしました。LINEやメールに貼り付けてください。')}};
function csvEscape(v){return '"'+String(v).replace(/"/g,'""')+'"'}
document.getElementById('csvBtn').onclick=()=>{const rows=[['分類','項目','内容']];allRows().forEach(([title,items])=>items.forEach(([l,v])=>rows.push([title,l,v])));const csv='\uFEFF'+rows.map(r=>r.map(csvEscape).join(',')).join('\r\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`これからノート_${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(a.href)};
document.getElementById('resetBtn').onclick=()=>{if(confirm('入力内容をすべて消去しますか？')){localStorage.removeItem(STORAGE);state={};render();document.getElementById('saveState').textContent='消去しました'}};
</script>
</body></html>
