<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#eef7ef" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="未来に残すノート" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>未来に残すノート</title>
  <style>
    :root{--bg:#eef7ef;--bg2:#f8f5eb;--panel:#fffdf7;--ink:#294033;--muted:#6f8175;--line:#d7e5d9;--accent:#6bb982;--accent2:#a8d8b3;--danger:#bd6666;--shadow:0 14px 38px rgba(55,85,65,.09);--glow:0 0 22px rgba(107,185,130,.15)}
    *{box-sizing:border-box;min-width:0}html{scroll-behavior:smooth;background:var(--bg);overflow-x:hidden}
    body{margin:0;width:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;color:var(--ink);background:radial-gradient(circle at 12% 3%,rgba(168,216,179,.28),transparent 25%),radial-gradient(circle at 92% 7%,rgba(255,255,255,.75),transparent 28%),linear-gradient(160deg,var(--bg) 0%,var(--bg2) 100%);overflow-x:hidden}
    body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.16;background-image:radial-gradient(circle,rgba(107,185,130,.24) 1px,transparent 1px);background-size:28px 28px;mask-image:linear-gradient(to bottom,black,transparent 78%)}
    button,input,textarea,select{font:inherit;max-width:100%}button{cursor:pointer}
    .wrap{width:min(860px,calc(100% - 24px));margin:0 auto;padding:24px 0 max(18px,env(safe-area-inset-bottom));position:relative}
    header{position:relative;padding:22px 4px 14px;overflow:hidden}
    header:after{content:"";position:absolute;right:8px;top:10px;width:92px;height:92px;background:linear-gradient(145deg,rgba(107,185,130,.16),rgba(255,255,255,.15));clip-path:polygon(50% 0,68% 30%,100% 38%,73% 60%,78% 100%,50% 77%,22% 100%,27% 60%,0 38%,32% 30%);opacity:.46}
    .eyebrow{display:inline-flex;align-items:center;gap:9px;font-size:12px;font-weight:800;letter-spacing:.13em;color:#548e68}.eyebrow:before{content:"";width:24px;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px}
    h1{position:relative;z-index:1;margin:10px 0 8px;font-size:clamp(34px,8vw,56px);line-height:1.08;letter-spacing:-.03em;color:#315d41}
    header p{position:relative;z-index:1;margin:0;color:var(--muted);line-height:1.8;max-width:610px}
    .notice{margin:14px 0;background:rgba(255,253,247,.84);border:1px solid var(--line);border-radius:18px;padding:14px 16px;font-size:13px;line-height:1.7;box-shadow:var(--shadow)}.notice strong{color:#47775a}
    .progress-card{margin:14px 0;padding:15px 16px;border-radius:18px;background:rgba(255,253,247,.88);border:1px solid var(--line);box-shadow:var(--shadow)}
    .progress-top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}.progress-label{font-weight:800}.progress-count{font-size:13px;color:#548e68;white-space:nowrap}.progress-track{height:9px;border-radius:999px;background:#e5eee7;overflow:hidden}.progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),#b8dfbd);box-shadow:0 0 14px rgba(107,185,130,.25);transition:width .25s}.missing{margin:10px 0 0;color:var(--muted);font-size:12px;line-height:1.6}.missing strong{color:var(--danger)}
    .toolbar{position:sticky;top:0;z-index:6;display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:9px;padding:10px 0;background:rgba(238,247,239,.91);backdrop-filter:blur(16px);border-bottom:1px solid rgba(107,185,130,.15)}
    .btn{width:auto;min-width:0;border:1px solid var(--line);background:#fffdf8;border-radius:14px;padding:11px 14px;color:var(--ink);font-weight:800;transition:.2s;white-space:normal;box-shadow:0 5px 16px rgba(55,85,65,.05)}.btn:hover{transform:translateY(-1px);border-color:#a9cfb2;box-shadow:var(--glow)}.btn.primary{background:linear-gradient(120deg,#7fc391,#b8dfbd);border-color:transparent;color:#173522;box-shadow:0 10px 26px rgba(107,185,130,.2)}.btn.danger{color:var(--danger)}.btn:disabled{cursor:not-allowed;opacity:.45;filter:saturate(.4);transform:none;box-shadow:none}
    .save-state{grid-column:1/-1;font-size:12px;color:#548e68;display:flex;align-items:center;gap:7px}.save-state:before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px rgba(107,185,130,.55)}
    section{position:relative;overflow:hidden;width:100%;background:rgba(255,253,247,.94);border:1px solid var(--line);border-radius:24px;padding:20px;margin:14px 0;box-shadow:var(--shadow)}section:before{content:"";position:absolute;inset:0 0 auto 0;height:3px;background:linear-gradient(90deg,#b8dfbd,var(--accent),#dcecdf);opacity:.85}
    .section-head{margin-bottom:16px;position:relative;z-index:1}.section-head h2{margin:0;font-size:21px;color:#345a40}.section-head p{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.6}
    .grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px;width:100%}.field{display:flex;flex-direction:column;gap:8px;position:relative;z-index:1;width:100%}.field.full{grid-column:1/-1}.field label{font-size:13px;font-weight:800;color:#3f654b}
    .field input,.field textarea,.field select{display:block;width:100%;min-width:0;border:1px solid #d7e5d9;border-radius:14px;background:#fbfdf9;padding:13px 14px;color:var(--ink);outline:none;transition:.2s}.field textarea{min-height:88px;resize:vertical}.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(107,185,130,.12),0 6px 18px rgba(107,185,130,.08)}.field .invalid{border-color:rgba(189,102,102,.72);box-shadow:0 0 0 3px rgba(189,102,102,.08)}select option{color:#294033;background:#fff}
    .footer-note{font-size:12px;line-height:1.7;color:var(--muted);padding:6px 5px 0;text-align:center;margin:0}
    dialog{border:1px solid var(--line);border-radius:22px;padding:0;width:min(650px,calc(100% - 20px));max-width:calc(100vw - 20px);background:#fffdf7;color:var(--ink);box-shadow:0 28px 80px rgba(55,85,65,.24)}dialog::backdrop{background:rgba(46,68,52,.26);backdrop-filter:blur(6px)}.modal{padding:20px;max-width:100%;overflow:hidden}.modal h3{margin:0 0 13px}.preview{white-space:pre-wrap;overflow-wrap:anywhere;background:#f5f9f4;border:1px solid var(--line);border-radius:15px;padding:14px;max-height:52vh;overflow:auto;line-height:1.75;font-size:14px}.modal-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:15px;flex-wrap:wrap}
    @media(max-width:620px){.wrap{width:calc(100% - 16px);padding-top:8px;padding-bottom:max(12px,env(safe-area-inset-bottom))}header{padding:20px 4px 12px}header:after{opacity:.32;transform:scale(.78);transform-origin:top right}.notice,.progress-card{border-radius:16px}.toolbar{grid-template-columns:minmax(0,1fr) minmax(0,1fr)}.toolbar .primary{grid-column:1/-1}.btn{width:100%;padding:11px 10px;font-size:14px}.save-state{grid-column:1/-1}.grid{grid-template-columns:minmax(0,1fr)}.field.full{grid-column:auto}section{padding:16px;border-radius:18px;margin:12px 0}.section-head h2{font-size:19px}.modal-actions .btn{flex:1 1 120px}.footer-note{padding-bottom:0}}
  </style>
</head>
<body>
<main class="wrap">
  <header><div class="eyebrow">これからの想いを、やさしく残す</div><h1>未来に残すノート</h1><p>すべての項目を整理して、完成した内容を家族へ共有できます。</p></header>
  <div class="notice"><strong>安全のため：</strong>暗証番号やパスワードそのものは入力せず、「保管場所」だけを記録してください。</div>
  <div class="progress-card">
    <div class="progress-top"><span class="progress-label" id="progressLabel">入力状況</span><span class="progress-count" id="progressCount">0 / 17</span></div>
    <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
    <p class="missing" id="missingText">未入力の項目があります。</p>
  </div>
  <div class="toolbar">
    <button class="btn primary" id="shareBtn" type="button" disabled>完成した内容を共有</button>
    <button class="btn" id="csvBtn" type="button">CSV</button>
    <button class="btn danger" id="resetBtn" type="button">すべて消去</button>
    <span class="save-state" id="saveState">保存済み</span>
  </div>
  <form id="noteForm" autocomplete="off"></form>
  <p class="footer-note">このノートは希望や情報を整理するためのものです。相続方法を法的に指定する場合は、正式な遺言書が必要です。</p>
</main>
<dialog id="shareDialog"><div class="modal"><h3>完成した内容</h3><div class="preview" id="sharePreview"></div><div class="modal-actions"><button class="btn" id="closeDialog" type="button">閉じる</button><button class="btn" id="copyBtn" type="button">コピー</button><button class="btn primary" id="nativeShareBtn" type="button">LINE・メールで共有</button></div></div></dialog>
<script>
const sections=[
 {title:'最初に連絡する人',desc:'もしものとき、最初に知らせてほしい人',fields:[['contactName','氏名','text'],['relation','続柄','text'],['phone','電話番号','tel']]},
 {title:'医療について',desc:'治療や判断に必要な最低限の情報',fields:[['conditions','持病・服用中の薬','textarea'],['allergies','アレルギー','textarea'],['lifeSupport','延命治療の希望','select',['未選択','希望する','希望しない','家族・医師の判断に任せる','その他']],['decisionMaker','判断を任せたい人','text']]},
 {title:'財産・保険・借入れ',desc:'金額ではなく、存在と確認先を中心に',fields:[['banks','利用している銀行','textarea'],['securities','証券会社','textarea'],['insurance','保険会社','textarea'],['debts','借金・ローン','textarea'],['documents','重要書類の保管場所','textarea']]},
 {title:'スマートフォン・葬儀',desc:'解約や手続きで家族が困らないために',fields:[['passwordLocation','スマホやパスワード情報の保管場所','textarea'],['subscriptions','解約が必要なサービス','textarea'],['funeral','葬儀の希望','textarea'],['grave','お墓の場所','textarea'],['writtenDate','記入日','date']]}
];
const STORAGE='korekara-note-v1';
let state=JSON.parse(localStorage.getItem(STORAGE)||'{}');
const form=document.getElementById('noteForm');
const allFields=sections.flatMap(sec=>sec.fields.map(field=>({section:sec.title,id:field[0],label:field[1],type:field[2]})));
function esc(s){return String(s).replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]))}
function render(){form.innerHTML=sections.map(sec=>`<section><div class="section-head"><h2>${sec.title}</h2><p>${sec.desc}</p></div><div class="grid">${sec.fields.map(f=>{const [id,label,type,opts]=f;const value=state[id]||'';const control=type==='textarea'?`<textarea id="${id}" data-key="${id}" aria-label="${label}">${esc(value)}</textarea>`:type==='select'?`<select id="${id}" data-key="${id}" aria-label="${label}">${opts.map(o=>`<option ${value===o?'selected':''}>${o}</option>`).join('')}</select>`:`<input id="${id}" data-key="${id}" type="${type}" value="${esc(value)}" aria-label="${label}">`;return `<div class="field ${type==='textarea'?'full':''}"><label for="${id}">${label}</label>${control}</div>`}).join('')}</div></section>`).join('');updateCompletion()}
function valueFilled(field){const value=String(state[field.id]||'').trim();return value!==''&&value!=='未選択'}
function missingFields(){return allFields.filter(field=>!valueFilled(field))}
function updateCompletion(){const missing=missingFields();const completed=allFields.length-missing.length;const percent=Math.round(completed/allFields.length*100);document.getElementById('progressCount').textContent=`${completed} / ${allFields.length}`;document.getElementById('progressBar').style.width=`${percent}%`;const shareBtn=document.getElementById('shareBtn');shareBtn.disabled=missing.length>0;if(missing.length===0){document.getElementById('progressLabel').textContent='完成しました';document.getElementById('missingText').innerHTML='すべての項目が入力されています。共有できます。'}else{document.getElementById('progressLabel').textContent='入力状況';document.getElementById('missingText').innerHTML=`<strong>残り${missing.length}項目：</strong>${missing.map(f=>f.label).join('、')}`}}
render();
let timer;
form.addEventListener('input',e=>{if(!e.target.dataset.key)return;state[e.target.dataset.key]=e.target.value;e.target.classList.remove('invalid');updateCompletion();document.getElementById('saveState').textContent='保存中…';clearTimeout(timer);timer=setTimeout(()=>{localStorage.setItem(STORAGE,JSON.stringify(state));document.getElementById('saveState').textContent='保存済み'},250)});
function allRows(){return sections.map(sec=>[sec.title,sec.fields.map(([id,label])=>[label,String(state[id]||'').trim()])])}
function shareText(){return ['【未来に残すノート】',...allRows().flatMap(([title,items])=>['',`■ ${title}`,...items.map(([label,value])=>`${label}：${value}`)])].join('\n')}
function focusFirstMissing(){const missing=missingFields();document.querySelectorAll('.invalid').forEach(el=>el.classList.remove('invalid'));if(!missing.length)return true;missing.forEach(field=>document.getElementById(field.id)?.classList.add('invalid'));const first=document.getElementById(missing[0].id);first?.scrollIntoView({behavior:'smooth',block:'center'});setTimeout(()=>first?.focus(),350);return false}
const dialog=document.getElementById('shareDialog');
document.getElementById('shareBtn').onclick=()=>{if(!focusFirstMissing())return;document.getElementById('sharePreview').textContent=shareText();dialog.showModal()};
document.getElementById('closeDialog').onclick=()=>dialog.close();
document.getElementById('copyBtn').onclick=async()=>{await navigator.clipboard.writeText(shareText());document.getElementById('copyBtn').textContent='コピーしました';setTimeout(()=>document.getElementById('copyBtn').textContent='コピー',1300)};
document.getElementById('nativeShareBtn').onclick=async()=>{const text=shareText();if(navigator.share){await navigator.share({title:'未来に残すノート',text})}else{await navigator.clipboard.writeText(text);alert('共有機能が使えないため、内容をコピーしました。LINEやメールに貼り付けてください。')}};
function csvEscape(v){return '"'+String(v).replace(/"/g,'""')+'"'}
document.getElementById('csvBtn').onclick=()=>{const rows=[['分類','項目','内容']];allRows().forEach(([title,items])=>items.forEach(([label,value])=>rows.push([title,label,value])));const csv='\uFEFF'+rows.map(r=>r.map(csvEscape).join(',')).join('\r\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`未来に残すノート_${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(a.href)};
document.getElementById('resetBtn').onclick=()=>{if(confirm('入力内容をすべて消去しますか？')){localStorage.removeItem(STORAGE);state={};render();document.getElementById('saveState').textContent='消去しました'}};
</script>
</body>
</html>
