<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1f16"/>
      <stop offset="100%" stop-color="#163a27"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2fff5"/>
      <stop offset="100%" stop-color="#d8ffe3"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d9ffe5"/>
      <stop offset="45%" stop-color="#95f7b1"/>
      <stop offset="100%" stop-color="#49df82"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <circle cx="392" cy="118" r="74" fill="#8ff7b2" opacity=".07"/>
  <rect x="112" y="100" width="288" height="316" rx="44" fill="rgba(255,255,255,.04)" stroke="rgba(217,255,229,.10)" stroke-width="2"/>

  <rect x="144" y="122" width="224" height="270" rx="30" fill="url(#panel)"/>
  <rect x="166" y="154" width="176" height="12" rx="6" fill="rgba(20,58,39,.18)"/>
  <rect x="166" y="184" width="154" height="10" rx="5" fill="rgba(20,58,39,.12)"/>
  <rect x="166" y="208" width="138" height="10" rx="5" fill="rgba(20,58,39,.10)"/>

  <path d="M256 342c0-72 29-124 83-170" fill="none" stroke="url(#neon)" stroke-width="18" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M255 307c-28-31-59-48-99-59 10 48 43 88 99 103" fill="none" stroke="url(#neon)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M276 247c34-43 73-68 126-79-10 55-45 99-116 113" fill="none" stroke="url(#neon)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="335" cy="183" r="8" fill="#effff4" filter="url(#glow)"/>
  <circle cx="215" cy="314" r="7" fill="#86f3a7" filter="url(#glow)"/>
